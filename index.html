<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script src="assets/lottie-player.js"></script>
</head>
<body>

  <header>
    <div class="header-inner">
      <a href="index.html" class="logo-link">
        <img src="img/Logo.png" alt="Logo" class="logo-img">
      </a>

      <nav>
        <a href="index.html" class="active">Accueil</a>
        <a href="documentation.html">Documentation</a>
      </nav>

      <div class="header-actions">
        <!-- Bouton unique : texte change selon l'état -->
        <button id="btn-toggle" class="btn-auth btn-login">
          Se connecter
        </button>

        <!-- Visible uniquement quand connecté -->
        <a id="btn-profile" class="btn-auth btn-profile hidden" href="profil.html">
          <span class="avatar">🌸</span>
          Profil
        </a>
      </div>
    </div>
  </header>

  <main>
    <section class="hero">
      <h1 style="display: flex; align-items: center; justify-content: center; gap: 8px;">
        Projet HotHotHot
        <lottie-player
          src="assets/Fire.json"
          background="transparent"
          speed="1"
          style="width: 80px; height: 80px; vertical-align: middle; margin-bottom: 40px;"
          loop autoplay
        ></lottie-player>
      </h1>
      <p>Interface domotique — capteurs de température en temps réel.</p>
    </section>

    <div class="tabs">
      <button class="tab-btn active" data-tab="realtime">Données en temps réel</button>
      <button class="tab-btn" data-tab="historique">Historique</button>
    </div>

    <div class="tab-content active" id="realtime">
    </div>

    <div class="tab-content" id="historique">
    </div>

  </main>

  <footer>
    BUT &nbsp;·&nbsp; Groupe HotHotHot &nbsp;·&nbsp; 2026 🌸
  </footer>

  <script src="main.js"></script>
  <script>
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById(btn.dataset.tab).classList.add('active');
      });
    });
  </script>

</body>
</html>
